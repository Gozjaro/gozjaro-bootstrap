        type: sha256
        value: ""
    build:
      system: autotools
      configure:
        - --prefix=/usr
        - --sysconfdir=/etc
        - --enable-ld=default
        - --enable-plugins
        - --enable-shared
        - --disable-werror
        - --enable-64-bit-bfd
        - --enable-new-dtags
        - --with-system-zlib
        - --enable-default-hash-style=gnu
      install_check: ld --version
    dependencies: []

