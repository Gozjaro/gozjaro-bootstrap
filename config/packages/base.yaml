# Gozjaro Base Packages (LFS 12.3 equivalent)
# Core packages required for a minimal working system.

packages:
  - name: acl
    version: "2.3.2"
    category: base
    source:
      url: https://download.savannah.gnu.org/releases/acl/acl-2.3.2.tar.xz
      checksum:
        type: sha256
        value: ""
    build:
      system: autotools
      configure:
        - --prefix=/usr
        - --disable-static
      install_check: getfacl --version
    dependencies:
      - attr

  - name: attr
    version: "2.5.2"
    category: base
    source:
      url: https://download.savannah.gnu.org/releases/attr/attr-2.5.2.tar.gz
      checksum:
        type: sha256
        value: ""
    build:
      system: autotools
      configure:
        - --prefix=/usr
        - --disable-static
      install_check: getfattr --version
    dependencies: []

  - name: autoconf
    version: "2.72"
    category: base
    source:
      url: https://mirrors.kernel.org/gnu/autoconf/autoconf-2.72.tar.xz
      checksum:
        type: sha256
        value: ""
    build:
      system: autotools
      configure:
        - --prefix=/usr
      install_check: autoconf --version
    dependencies: []

  - name: automake
    version: "1.17"
    category: base
    source:
      url: https://mirrors.kernel.org/gnu/automake/automake-1.17.tar.xz
      checksum:
        type: sha256
        value: ""
    build:
      system: autotools
      configure:
        - --prefix=/usr
        - --docdir=/usr/share/doc/automake-1.17
      install_check: automake --version
    dependencies:
      - perl

  - name: bash
    version: "5.2.37"
    category: base
    source:
      url: https://mirrors.kernel.org/gnu/bash/bash-5.2.37.tar.gz
      checksum:
        type: sha256
        value: ""
    build:
      system: autotools
      configure:
        - --prefix=/usr
        - --without-bash-malloc
        - --with-installed-readline
        - --docdir=/usr/share/doc/bash-5.2.37
      install_check: bash --version
    dependencies:
      - readline
      - ncurses

  - name: bc
    version: "7.0.3"
    category: base
    source:
      url: https://github.com/gavinhoward/bc/releases/download/7.0.3/bc-7.0.3.tar.xz
      checksum:
        type: sha256
        value: ""
    build:
      system: autotools
      configure:
        - CC=gcc
        - --prefix=/usr
        - -G
        - -O3
        - -r
      install_check: bc --version
    dependencies: []

  - name: binutils
    version: "2.44"
